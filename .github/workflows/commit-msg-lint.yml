name: Commit Message Lint

on:
  workflow_call: {}
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  lint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install celestia-devtools
        run: pip install git+https://github.com/celestia-island/celestia-devtools.git@master

      - name: Lint all commits in the PR
        if: github.base_ref != ''
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          RANGE="${BASE_SHA}..${HEAD_SHA}"
          echo "Linting commits in range: $RANGE"
          git log --format='%s' "$RANGE" | \
          celestia-devtools commit-msg-lint check --stdin-subjects

      # On push (no base_ref), lint all new commits in the push range.
      - name: Lint all new commits on push
        if: github.base_ref == '' && github.event_name == 'push'
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          # github.event.before is all-zeros for the first push to a branch.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="$AFTER"
          else
            RANGE="${BEFORE}..${AFTER}"
          fi
          echo "Linting commits in range: $RANGE"
          git log --format='%s' "$RANGE" | \
          celestia-devtools commit-msg-lint check --stdin-subjects
