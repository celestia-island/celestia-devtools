# Mock workspace registry — UUID → metadata lookup table.
#
# Each workspace is identified by its database UUID (matching seed.sql).
# Fixture data lives under fixtures/<uuid>/.
#
# Fields:
#   uuid        — workspace UUID (matches seed.sql workspace_sessions.id)
#   name        — human-readable label
#   owner       — account username
#   kind        — workspace kind (personal / local_filesystem / git / container)
#   remote      — git remote URL (only for kind=git)
#   branch      — git branch (only for kind=git)
#   path        — filesystem path (for local_filesystem / container)
#   visibility  — list of usernames who can access this workspace
#   projects    — repos/projects contained in this workspace
#   scenarios   — mock playback scenarios active for this workspace

version = "0.2.0"

